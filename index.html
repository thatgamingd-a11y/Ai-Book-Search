<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Book Search</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

  <h1>📚 AI Book Search</h1>

  <p>Upload a book or paste text below, then ask a question or enter keywords.</p>

  <input type="file" id="fileInput" accept=".txt" />

  <textarea id="bookText" placeholder="Or paste book text here..." rows="12"></textarea>

  <input id="queryInput" placeholder="Enter keywords or questions..." />

  <button id="searchBtn">Search</button>

  <div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
