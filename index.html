<!DOCTYPE html>
<html>
<head>
<title>AI Book Search</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>📚 AI Book Search</h1>
<p>Upload a book and ask questions about it.</p>

<input type="file" id="fileInput">

<textarea id="bookText" placeholder="Or paste book text here..."></textarea>

<input id="query" placeholder="Ask a question about the book">

<button onclick="searchBook()">Search</button>

<h2>Results</h2>
<div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
