<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Book Search</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

  <h1>📚 AI Book Search</h1>
  <p class="subtitle">Upload a book or paste text, then search keywords or ask questions.</p>

  <input type="file" id="fileInput" accept=".txt">
  <textarea id="bookText" placeholder="Or paste book text here..." rows="12"></textarea>

  <div class="sections">

    <!-- Keyword Search -->
    <div class="section">
      <h2>🔍 Keyword Search</h2>
      <input id="keywordInput" placeholder="Enter keywords...">
      <button id="keywordBtn">Search Keywords</button>
      <div id="keywordResults" class="results"></div>
    </div>

    <!-- Question Search -->
    <div class="section">
      <h2>💬 Ask a Question</h2>
      <input id="questionInput" placeholder="Ask a question about the book...">
      <button id="questionBtn">Ask AI</button>
      <div id="questionResults" class="results"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
