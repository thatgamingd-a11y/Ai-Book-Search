<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Book Search</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>📚 AI Book Search</h1>
  <p>Upload a book or paste text, then either search keywords or ask questions.</p>

  <input type="file" id="fileInput" accept=".txt">

  <textarea id="bookText" placeholder="Or paste book text here..." rows="12"></textarea>

  <!-- Keyword Search Section -->
  <div class="section">
    <h2>Keyword Search</h2>
    <input id="keywordInput" placeholder="Enter keywords...">
    <button id="keywordBtn">Search Keywords</button>
    <div id="keywordResults"></div>
  </div>

  <!-- Question Section -->
  <div class="section">
    <h2>Ask a Question</h2>
    <input id="questionInput" placeholder="Ask a question about the book...">
    <button id="questionBtn">Ask AI</button>
    <div id="questionResults"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
